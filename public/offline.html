<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>You're offline — JustShootMe</title>
<meta name="robots" content="noindex">
<!--
  Deliberately self-contained (inline CSS/SVG, no external stylesheet or font
  requests) — this is what sw.js serves in place of a failed navigation when
  there's no network, so it can't itself depend on the network to look right.
-->
<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    padding-top: calc(1.5rem + env(safe-area-inset-top));
    padding-bottom: calc(1.5rem + env(safe-area-inset-bottom));
    background: #00d1b2;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: #fff;
    border-radius: 12px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 0.5em 1em -0.125em rgba(10, 10, 10, 0.2);
  }
  .icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 1.25rem;
  }
  h1 {
    font-size: 1.375rem;
    font-weight: 700;
    margin: 0 0 0.5rem;
    color: #1a1a1a;
  }
  p {
    margin: 0 0 1.75rem;
    color: #4a4a4a;
    line-height: 1.5;
  }
  button {
    font: inherit;
    font-weight: 600;
    font-size: 1rem;
    color: #fff;
    background: #00d1b2;
    border: none;
    border-radius: 8px;
    padding: 0.75rem 2rem;
    cursor: pointer;
  }
  button:active {
    background: #00b89c;
  }
</style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="12" y="32" width="76" height="52" rx="8" fill="#00d1b2"/>
      <rect x="38" y="22" width="24" height="12" rx="3" fill="#00d1b2"/>
      <circle cx="50" cy="58" r="17" fill="#fff"/>
      <circle cx="50" cy="58" r="10" fill="#00d1b2"/>
      <circle cx="44" cy="52" r="3" fill="#fff"/>
      <rect x="66" y="26" width="8" height="8" rx="2" fill="#00d1b2"/>
    </svg>
    <h1>You're offline</h1>
    <p>Looks like the connection dropped. Check your Wi&#8209;Fi and give it another try.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
