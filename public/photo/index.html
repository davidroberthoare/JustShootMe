<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Photo</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/assets/vendor/bulma/bulma.min.css">
<link rel="stylesheet" href="/assets/vendor/phosphor/regular/style.css">
<!--
  No app-specific CSS file needed on this page: Bulma's hero/columns
  handle the centred responsive layout, and .box already supplies the
  rounded corners + shadow around the photo.
-->
</head>
<body>
<section class="hero is-fullheight">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-5-tablet is-4-desktop has-text-centered">

          <p id="status" class="has-text-grey">Loading your photo&hellip;</p>

          <div class="box is-hidden" id="photo-box">
            <figure class="image">
              <img id="photo" alt="Your photobooth photo">
            </figure>
            <div class="buttons is-centered mt-4">
              <a id="download-link" download="photo.jpg">
                <button class="button is-primary">
                  <span class="icon"><i class="ph ph-download-simple"></i></span>
                  <span>Download</span>
                </button>
              </a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>

<script>
/**
 * Guest photo page — the destination of the QR code shown at the booth
 * (see booth.js) and of the "email me a copy" link (see MailService).
 * Shows just this one guest's photo, never the full event gallery (spec).
 */
(async function () {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const statusEl = document.getElementById('status');
  const box = document.getElementById('photo-box');
  const img = document.getElementById('photo');

  if (!id) {
    statusEl.textContent = 'No photo specified.';
    return;
  }

  try {
    const res = await fetch(`/api/photos/${encodeURIComponent(id)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Photo not found.');

    document.title = `Photo — ${data.photo.event_name}`;
    img.src = data.photo.image_url;
    document.getElementById('download-link').href = data.photo.image_url;
    box.classList.remove('is-hidden');
    statusEl.classList.add('is-hidden');
  } catch (err) {
    statusEl.textContent = err.message;
  }
})();
</script>
</body>
</html>
