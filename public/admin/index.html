<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photobooth Admin</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/assets/vendor/bulma/bulma.min.css">
<link rel="stylesheet" href="/assets/vendor/bootstrap-icons/icons.css">
<link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

<section id="login-view" class="hero is-fullheight is-hidden">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-4">
          <div class="box">
            <h1 class="title is-4 has-text-centered">
              <svg class="bi mr-2"><use href="/assets/vendor/bootstrap-icons/sprite.svg#camera-fill"/></svg> Photobooth Admin
            </h1>
            <form id="login-form">
              <div class="field">
                <label class="label" for="login-email">Email</label>
                <div class="control has-icons-left">
                  <input class="input" type="email" id="login-email" required autocomplete="username">
                  <span class="icon is-small is-left"><svg class="bi"><use href="/assets/vendor/bootstrap-icons/sprite.svg#envelope"/></svg></span>
                </div>
              </div>
              <div class="field">
                <label class="label" for="login-password">Password</label>
                <div class="control has-icons-left">
                  <input class="input" type="password" id="login-password" required autocomplete="current-password">
                  <span class="icon is-small is-left"><svg class="bi"><use href="/assets/vendor/bootstrap-icons/sprite.svg#lock"/></svg></span>
                </div>
              </div>
              <div class="field mt-5">
                <button type="submit" class="button is-link is-fullwidth">
                  <span class="icon"><svg class="bi"><use href="/assets/vendor/bootstrap-icons/sprite.svg#box-arrow-in-right"/></svg></span>
                  <span>Log in</span>
                </button>
              </div>
              <p id="login-error" class="help is-danger is-hidden"></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="dashboard-view" class="is-hidden">
  <nav class="navbar is-link" role="navigation">
    <div class="container">
      <div class="navbar-brand">
        <span class="navbar-item">
          <svg class="bi mr-2"><use href="/assets/vendor/bootstrap-icons/sprite.svg#camera-fill"/></svg> <strong>Photobooth Admin</strong>
        </span>
      </div>
      <div class="navbar-menu">
        <div class="navbar-end">
          <span class="navbar-item" id="admin-email"></span>
          <div class="navbar-item">
            <button class="button is-link is-inverted" id="logout-btn">
              <span class="icon"><svg class="bi"><use href="/assets/vendor/bootstrap-icons/sprite.svg#box-arrow-right"/></svg></span>
              <span>Log out</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-5 px-4">

    <div id="events-list-view">
      <div class="box">
        <h2 class="title is-5"><svg class="bi mr-2"><use href="/assets/vendor/bootstrap-icons/sprite.svg#plus-circle"/></svg>New event</h2>
        <form id="create-event-form">
          <div class="columns is-multiline">
            <div class="column is-6">
              <div class="field">
                <label class="label" for="event-name">Event name</label>
                <div class="control">
                  <input class="input" type="text" id="event-name" required>
                </div>
              </div>
            </div>
            <div class="column is-6">
              <div class="field">
                <label class="label" for="event-bg-color">Background colour</label>
                <div class="control">
                  <input class="input" type="color" id="event-bg-color" value="#111111">
                </div>
              </div>
            </div>
            <div class="column is-6">
              <div class="field">
                <label class="label" for="event-logo">Logo (optional)</label>
                <div class="file has-name is-fullwidth">
                  <label class="file-label">
                    <input class="file-input" type="file" id="event-logo" accept="image/*">
                    <span class="file-cta">
                      <span class="file-icon"><svg class="bi"><use href="/assets/vendor/bootstrap-icons/sprite.svg#image"/></svg></span>
                      <span class="file-label">Choose a logo&hellip;</span>
                    </span>
                    <span class="file-name" id="event-logo-name">No file selected</span>
                  </label>
                </div>
              </div>
            </div>
            <div class="column is-3">
              <div class="field">
                <label class="label" for="event-photo-cap">Photo cap</label>
                <div class="control">
                  <input class="input" type="number" id="event-photo-cap" min="0" placeholder="server default">
                </div>
              </div>
            </div>
            <div class="column is-3">
              <div class="field">
                <label class="label" for="event-storage-cap">Storage cap (MB)</label>
                <div class="control">
                  <input class="input" type="number" id="event-storage-cap" min="0" placeholder="server default">
                </div>
              </div>
            </div>
          </div>
          <div class="field mt-3">
            <button type="submit" class="button is-primary">
              <span class="icon"><svg class="bi"><use href="/assets/vendor/bootstrap-icons/sprite.svg#check-circle"/></svg></span>
              <span>Create event</span>
            </button>
          </div>
          <p id="create-event-error" class="help is-danger is-hidden"></p>
        </form>
      </div>

      <h2 class="title is-5 mt-5"><svg class="bi mr-2"><use href="/assets/vendor/bootstrap-icons/sprite.svg#calendar-event"/></svg>Events</h2>
      <div id="event-grid" class="columns is-multiline"></div>
    </div>

    <div id="event-detail-view" class="is-hidden">
      <a class="is-flex is-align-items-center mb-4" id="back-to-events">
        <svg class="bi mr-2"><use href="/assets/vendor/bootstrap-icons/sprite.svg#arrow-left"/></svg> All events
      </a>
      <div class="box">
        <h2 class="title is-5" id="detail-event-name"></h2>
        <div class="field has-addons" id="detail-booth-url"></div>
        <p class="is-size-7 has-text-grey" id="detail-stats"></p>
        <div class="field mt-4">
          <a id="detail-download-link">
            <button class="button">
              <span class="icon"><svg class="bi"><use href="/assets/vendor/bootstrap-icons/sprite.svg#download"/></svg></span>
              <span>Download all photos (.zip)</span>
            </button>
          </a>
        </div>
      </div>
      <div id="detail-photo-grid" class="photo-grid"></div>
    </div>

  </div>
</div>

<script src="/assets/js/admin.js"></script>
</body>
</html>
