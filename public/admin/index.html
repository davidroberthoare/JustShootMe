<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JustShootMe Admin</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="/assets/vendor/bulma/bulma.min.css">
<link rel="stylesheet" href="/assets/vendor/phosphor/regular/style.css">
<link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body>

<section id="login-view" class="hero is-fullheight is-hidden">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-4">
          <div class="box">
            <h1 class="title is-4 has-text-centered">
              <i class="ph ph-camera mr-2"></i> JustShootMe Admin
            </h1>
            <form id="login-form">
              <div class="field">
                <label class="label" for="login-email">Email</label>
                <div class="control has-icons-left">
                  <input class="input" type="email" id="login-email" required autocomplete="username">
                  <span class="icon is-small is-left"><i class="ph ph-envelope"></i></span>
                </div>
              </div>
              <div class="field">
                <label class="label" for="login-password">Password</label>
                <div class="control has-icons-left">
                  <input class="input" type="password" id="login-password" required autocomplete="current-password">
                  <span class="icon is-small is-left"><i class="ph ph-lock"></i></span>
                </div>
              </div>
              <div class="field mt-5">
                <button type="submit" class="button is-link is-fullwidth">
                  <span class="icon"><i class="ph ph-sign-in"></i></span>
                  <span>Log in</span>
                </button>
              </div>
              <p id="login-error" class="help is-danger is-hidden"></p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="dashboard-view" class="is-hidden">
  <nav class="navbar is-link" role="navigation">
    <div class="container">
      <div class="navbar-brand">
        <span class="navbar-item">
          <i class="ph ph-camera mr-2"></i> <strong>JustShootMe Admin</strong>
        </span>
      </div>
      <div class="navbar-menu">
        <div class="navbar-end">
          <span class="navbar-item" id="admin-email"></span>
          <div class="navbar-item">
            <button class="button is-link is-inverted" id="logout-btn">
              <span class="icon"><i class="ph ph-sign-out"></i></span>
              <span>Log out</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="container py-5 px-4">

    <div id="events-list-view">
      <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">
        <h2 class="title is-5 mb-0"><i class="ph ph-calendar mr-2"></i>Events</h2>
        <button class="button is-primary" id="new-event-btn">
          <span class="icon"><i class="ph ph-plus-circle"></i></span>
          <span>New event</span>
        </button>
      </div>
      <div id="event-grid" class="columns is-multiline"></div>
    </div>

    <div id="event-detail-view" class="is-hidden">
      <a class="is-flex is-align-items-center mb-4" id="back-to-events">
        <i class="ph ph-arrow-left mr-2"></i> All events
      </a>

      <div class="box">
        <h2 class="title is-5" id="detail-heading">New event</h2>
        <form id="event-form">
          <div class="columns is-multiline">
            <div class="column is-6">
              <div class="field">
                <label class="label" for="detail-name">Event name</label>
                <div class="control">
                  <input class="input" type="text" id="detail-name" required>
                </div>
              </div>
            </div>
            <div class="column is-6">
              <div class="field">
                <label class="label" for="detail-bg-color">Background colour</label>
                <div class="control">
                  <input class="input" type="color" id="detail-bg-color" value="#111111">
                </div>
              </div>
            </div>
            <div class="column is-6">
              <div class="field">
                <label class="label" for="detail-logo">Logo</label>
                <div class="is-flex is-align-items-center mb-2 is-hidden" id="detail-logo-preview-wrap">
                  <img id="detail-logo-preview" alt="Current logo" class="mr-2">
                  <span class="is-size-7 has-text-grey">Current logo</span>
                </div>
                <div class="file has-name is-fullwidth">
                  <label class="file-label">
                    <input class="file-input" type="file" id="detail-logo" accept="image/*">
                    <span class="file-cta">
                      <span class="file-icon"><i class="ph ph-image"></i></span>
                      <span class="file-label" id="detail-logo-cta">Choose a logo&hellip;</span>
                    </span>
                    <span class="file-name" id="detail-logo-name">No file selected</span>
                  </label>
                </div>
              </div>
            </div>
          </div>

          <div class="field is-grouped mt-3">
            <div class="control">
              <button type="submit" class="button is-primary" id="detail-save-btn">
                <span class="icon"><i class="ph ph-check-circle"></i></span>
                <span id="detail-save-label">Create event</span>
              </button>
            </div>
            <div class="control is-hidden" id="detail-delete-wrap">
              <button type="button" class="button is-danger is-light" id="detail-delete-btn">
                <span class="icon"><i class="ph ph-trash"></i></span>
                <span>Delete event</span>
              </button>
            </div>
          </div>
          <p id="detail-form-error" class="help is-danger is-hidden"></p>
          <p id="detail-form-success" class="help is-success is-hidden">Saved.</p>
        </form>
      </div>

      <div class="box is-hidden" id="detail-live-info">
        <label class="label is-size-7">Link to Live Photo Booth</label>
        <div class="is-flex is-align-items-center booth-link-row">
          <a id="detail-booth-link" target="_blank" rel="noopener" class="booth-link"></a>
          <button class="button is-small copy-btn" type="button" id="detail-copy-btn" title="Copy booth URL">
            <span class="icon is-small"><i class="ph ph-clipboard"></i></span>
          </button>
        </div>
        <p class="is-size-7 has-text-grey mt-3" id="detail-stats"></p>
        <div class="field mt-4">
          <a id="detail-download-link">
            <button class="button">
              <span class="icon"><i class="ph ph-download-simple"></i></span>
              <span>Download all photos (.zip)</span>
            </button>
          </a>
        </div>
      </div>

      <div id="detail-photo-grid" class="photo-grid"></div>
    </div>

  </div>
</div>

<script src="/assets/js/admin.js"></script>
</body>
</html>
